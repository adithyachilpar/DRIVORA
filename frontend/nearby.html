<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Warehouses - AgriVerse AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .warehouse-card {
            transition: all 0.3s;
            border-left: 4px solid #16a34a;
        }
        .warehouse-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #16a34a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .debug-panel {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: monospace;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg fixed h-full flex flex-col">
            <div class="p-6 border-b">
                <h1 class="text-2xl font-bold text-green-600">🌱 AgriVerse AI</h1>
                <p class="text-sm text-gray-500 mt-1">Smart Farming Assistant</p>
            </div>
            
            <nav class="p-4 flex-1">
                <a href="index.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg mb-2 text-gray-700 hover:bg-gray-100">
                    <i class="fas fa-home w-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="weather.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg mb-2 text-gray-700 hover:bg-gray-100">
                    <i class="fas fa-cloud-sun w-5"></i>
                    <span>Weather</span>
                </a>
                <a href="crops.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg mb-2 text-gray-700 hover:bg-gray-100">
                    <i class="fas fa-seedling w-5"></i>
                    <span>Crop Recommendations</span>
                </a>
                <a href="disease.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg mb-2 text-gray-700 hover:bg-gray-100">
                    <i class="fas fa-leaf w-5"></i>
                    <span>Disease Detection</span>
                </a>
                <a href="market.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg mb-2 text-gray-700 hover:bg-gray-100">
                    <i class="fas fa-chart-line w-5"></i>
                    <span>Market Prices</span>
                </a>
                <a href="chatbot.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg mb-2 text-gray-700 hover:bg-gray-100">
                    <i class="fas fa-robot w-5"></i>
                    <span>Farming Assistant</span>
                </a>
                <a href="nearby.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg mb-2 bg-green-50 text-green-600">
                    <i class="fas fa-warehouse w-5"></i>
                    <span>Nearby Warehouses</span>
                </a>
                <a href="add-farm.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg mb-2 text-green-600 hover:bg-green-50 mt-4">
                    <i class="fas fa-plus-circle w-5"></i>
                    <span>Add New Farm</span>
                </a>
                <button onclick="logout()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-red-600 hover:bg-red-50 mt-auto">
                    <i class="fas fa-sign-out-alt w-5"></i>
                    <span>Logout</span>
                </button>
            </nav>
            
            <div class="p-4 border-t">
                <div class="bg-green-50 p-4 rounded-lg" id="user-info">
                    <p class="text-sm text-green-800 font-medium">Loading...</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="ml-64 flex-1 p-8 overflow-y-auto">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">🏭 Nearby Warehouses & Storage</h1>
            
            <!-- Farm Selection -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-semibold mb-4">Select Your Farm</h2>
                <div class="flex space-x-4">
                    <select id="farmSelect" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                        <option value="">Loading your farms...</option>
                    </select>
                    <button onclick="findNearbyWarehouses()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
                        <i class="fas fa-search mr-2"></i>Find Warehouses
                    </button>
                </div>
            </div>

            <!-- Radius Selector -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <label class="block text-sm font-medium text-gray-700 mb-2">Search Radius (km)</label>
                <input type="range" id="radiusSlider" min="1" max="20" value="10" step="1" class="w-full" oninput="updateRadius()">
                <div class="flex justify-between text-sm text-gray-600 mt-2">
                    <span>1 km</span>
                    <span id="radiusValue">10 km</span>
                    <span>20 km</span>
                </div>
            </div>

            <!-- Search Type -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h3 class="font-semibold mb-3">Search for:</h3>
                <div class="flex space-x-4">
                    <label class="flex items-center">
                        <input type="radio" name="searchType" value="warehouses" checked class="mr-2"> 
                        Warehouses & Storage
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="searchType" value="vendors" class="mr-2"> 
                        Agricultural Vendors
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="searchType" value="both" class="mr-2"> 
                        Both
                    </label>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="hidden flex flex-col items-center justify-center py-12">
                <div class="loading-spinner mb-4"></div>
                <p class="text-gray-600">Searching nearby places...</p>
            </div>

            <!-- Results Container -->
            <div id="results" class="space-y-4"></div>

            <!-- Debug Panel (Hidden by default) -->
            <div id="debugPanel" class="mt-8 hidden">
                <button onclick="toggleDebug()" class="text-sm text-gray-600 mb-2">
                    <i class="fas fa-bug mr-1"></i>Toggle Debug Info
                </button>
                <div id="debugContent" class="debug-panel p-4 rounded-lg overflow-auto max-h-96 hidden">
                    <pre id="debugOutput" class="text-xs"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        let farms = [];
        let debugMode = false;

        // Load user info and farms
        document.addEventListener('DOMContentLoaded', async function() {
            const user = getUser();
            if (user) {
                document.getElementById('user-info').innerHTML = `
                    <p class="text-sm text-green-800 font-medium">${user.name}</p>
                    <p class="text-xs text-green-600 mt-1">Farmer</p>
                `;
            }
            await loadUserFarms();
        });

        async function loadUserFarms() {
            try {
                const token = getToken();
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }

                const response = await fetch('http://localhost:8000/api/farms/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                farms = await response.json();
                const select = document.getElementById('farmSelect');
                
                if (farms.length > 0) {
                    select.innerHTML = '<option value="">Select a farm</option>';
                    farms.forEach(farm => {
                        select.innerHTML += `<option value="${farm.id}">${farm.name} - ${farm.city}, ${farm.state}</option>`;
                    });
                } else {
                    select.innerHTML = '<option value="">No farms found. Add one first.</option>';
                }
            } catch (error) {
                console.error('Error loading farms:', error);
            }
        }

        function updateRadius() {
            const radius = document.getElementById('radiusSlider').value;
            document.getElementById('radiusValue').textContent = radius + ' km';
        }

        function toggleDebug() {
            const debugContent = document.getElementById('debugContent');
            debugContent.classList.toggle('hidden');
        }

        async function findNearbyWarehouses() {
            const farmId = document.getElementById('farmSelect').value;
            if (!farmId) {
                alert('Please select a farm first');
                return;
            }

            const selectedFarm = farms.find(f => f.id == farmId);
            if (!selectedFarm) return;

            const radius = document.getElementById('radiusSlider').value * 1000;
            const searchType = document.querySelector('input[name="searchType"]:checked').value;
            
            // Show loading
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').innerHTML = '';
            document.getElementById('debugPanel').classList.add('hidden');

            try {
                const token = getToken();
                let endpoint = '';
                
                if (searchType === 'vendors') {
                    endpoint = `http://localhost:8000/api/nearby/vendors?lat=${selectedFarm.location_lat}&lon=${selectedFarm.location_lon}&radius=${radius}&vendor_type=all`;
                } else {
                    endpoint = `http://localhost:8000/api/nearby/warehouses?lat=${selectedFarm.location_lat}&lon=${selectedFarm.location_lon}&radius=${radius}`;
                }
                
                console.log('Fetching:', endpoint);
                
                const response = await fetch(endpoint, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                console.log('API Response:', data);
                
                // Show debug info
                document.getElementById('debugOutput').textContent = JSON.stringify(data, null, 2);
                document.getElementById('debugPanel').classList.remove('hidden');
                
                displayResults(data, selectedFarm, searchType);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('results').innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-500 p-4">
                        <p class="text-red-700">Error: ${error.message}</p>
                    </div>
                `;
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function displayResults(data, farm, searchType) {
            const resultsDiv = document.getElementById('results');
            
            if (!data.success || !data.warehouses || data.warehouses.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="bg-yellow-50 border-l-4 border-yellow-500 p-4">
                        <p class="text-yellow-700">No ${searchType} found within ${document.getElementById('radiusSlider').value}km of your farm.</p>
                        <p class="text-sm text-gray-600 mt-2">Try increasing the search radius or selecting a different location.</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="bg-white rounded-lg shadow-md p-6 mb-4">
                    <h2 class="text-xl font-semibold mb-2">📍 Found ${data.total_found} places near ${farm.name}</h2>
                    <p class="text-gray-600">Searched within ${data.radius/1000}km radius</p>
                    <p class="text-xs text-gray-500 mt-1">Keywords tried: ${data.keywords_tried ? data.keywords_tried.join(', ') : 'warehouse, godown, storage'}</p>
                </div>
            `;

            data.warehouses.forEach((place, index) => {
                html += `
                    <div class="warehouse-card bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center">
                                    <span class="bg-green-100 text-green-800 text-xs font-semibold px-2 py-1 rounded mr-2">
                                        #${index + 1}
                                    </span>
                                    <h3 class="text-xl font-semibold text-gray-900">${place.name}</h3>
                                </div>
                                <p class="text-gray-600 mt-2">📍 ${place.address}</p>
                                <div class="flex flex-wrap items-center gap-2 mt-3">
                                    <span class="text-sm bg-blue-100 text-blue-800 px-3 py-1 rounded-full">
                                        📏 ${place.distance_km} km away
                                    </span>
                                    ${place.rating ? `
                                        <span class="text-sm bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full">
                                            ⭐ ${place.rating} (${place.total_ratings} reviews)
                                        </span>
                                    ` : ''}
                                    ${place.open_now !== null ? `
                                        <span class="text-sm ${place.open_now ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} px-3 py-1 rounded-full">
                                            ${place.open_now ? '🟢 Open now' : '🔴 Closed'}
                                        </span>
                                    ` : ''}
                                </div>
                                ${place.search_keyword ? `
                                    <p class="text-xs text-gray-400 mt-2">Found via: ${place.search_keyword}</p>
                                ` : ''}
                            </div>
                            <div class="text-right ml-4">
                                <span class="text-3xl font-bold text-green-600">${place.distance_km}</span>
                                <span class="text-gray-500 block text-sm">km</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
